<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIS - AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 20px 20px 0 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message.assistant {
            text-align: left;
        }

        .message-content {
            display: inline-block;
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.assistant .message-content {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 5px;
        }

        .action-info {
            font-size: 12px;
            margin-top: 8px;
            color: #666;
            font-style: italic;
        }

        .input-area {
            padding: 25px;
            background: white;
            border-top: 1px solid #e0e0e0;
            border-radius: 0 0 20px 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #userInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .quick-action-btn {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-action-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .timestamp {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .message-content {
                max-width: 90%;
            }

            .header h1 {
                font-size: 24px;
            }

            .container {
                max-height: 100vh;
            }

            .quick-action-btn {
                min-width: 100px;
                padding: 10px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 {{ name }}</h1>
            <p>Your AI Assistant - Ask anything, get things done!</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <h3>Welcome to {{ name }}!</h3>
                <p>Ask me anything - I can help with questions, get weather info, open YouTube, and more!</p>
            </div>
        </div>

        <div class="input-area">
            <div class="button-group">
                <button class="quick-action-btn" onclick="quickAction('Tell me a joke')">😂 Joke</button>
                <button class="quick-action-btn" onclick="quickAction('What time is it?')">⏰ Time</button>
                <button class="quick-action-btn" onclick="quickAction('What\\'s the weather in New York?')">🌤️ Weather</button>
                <button class="quick-action-btn" onclick="quickAction('Open YouTube')">📺 YouTube</button>
            </div>

            <div class="input-group">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Type your message here... (or ask for weather, jokes, open YouTube, etc.)"
                    onkeypress="handleKeyPress(event)"
                >
                <button onclick="sendMessage()">Send</button>
            </div>

            <button onclick="clearChat()" style="width: 100%; background: #e74c3c;">Clear Chat</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');

        function quickAction(action) {
            userInput.value = action;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add user message to chat
            addMessageToChat(message, 'user');
            userInput.value = '';
            userInput.focus();

            // Show loading indicator
            const loadingMsg = addMessageToChat('...', 'assistant');
            loadingMsg.innerHTML = '<div class="loading"></div>';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                // Remove loading message
                loadingMsg.remove();

                if (data.success) {
                    // Add assistant response
                    const content = data.response;
                    const actionResult = data.action_result;
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message assistant';
                    
                    let html = `<div class="message-content">${escapeHtml(content)}`;
                    
                    if (actionResult) {
                        html += `<div class="action-info">✓ ${escapeHtml(actionResult)}</div>`;
                    }
                    
                    html += `<div class="timestamp">${new Date().toLocaleTimeString()}</div></div>`;
                    msgDiv.innerHTML = html;
                    chatContainer.appendChild(msgDiv);
                } else {
                    addMessageToChat('Error: ' + data.error, 'assistant');
                }

                scrollToBottom();
            } catch (error) {
                loadingMsg.remove();
                addMessageToChat('Error connecting to server: ' + error.message, 'assistant');
            }
        }

        function addMessageToChat(message, type) {
            if (chatContainer.querySelector('.empty-state')) {
                chatContainer.innerHTML = '';
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `
                <div class="message-content">
                    ${escapeHtml(message)}
                    <div class="timestamp">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
            return msgDiv;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function clearChat() {
            if (confirm('Are you sure you want to clear the chat?')) {
                await fetch('/api/clear', { method: 'POST' });
                chatContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>Chat Cleared</h3>
                        <p>Start a new conversation with {{ name }}!</p>
                    </div>
                `;
            }
        }

        // Focus input on load
        userInput.focus();
    </script>
</body>
</html>
